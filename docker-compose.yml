services:

  # ─────────────────────────────────────────────────────────────
  # NGINX — proxy reverso no host nas portas 80/443
  # Roteia / para php-app:9000 (FPM) e /api/ para dotnet-api:8081
  # ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: briefapp-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/briefapp.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/public:/var/www/html:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - php-app
      - dotnet-api
    networks:
      - briefapp-net
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # PHP-FPM — frontend PHP 8.2 na porta alta 9000 (FPM interno)
  # Nginx faz fastcgi_pass para este container
  # ─────────────────────────────────────────────────────────────
  php-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: briefapp-php
    expose:
      - "9000"
    volumes:
      - ./frontend:/var/www/html:ro
      - duckdb-data:/var/data
    env_file:
      - .env
    networks:
      - briefapp-net
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # .NET API — backend ASP.NET Core 8 na porta alta 8081
  # ─────────────────────────────────────────────────────────────
  dotnet-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: briefapp-dotnet
    expose:
      - "8081"
    volumes:
      - duckdb-data:/app/data
      - briefapp-logs:/var/log/briefapp
      - ./infra/gcp/sa-key.json:/etc/gcp/sa-key.json:ro
    env_file:
      - .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/etc/gcp/sa-key.json
      - ASPNETCORE_URLS=http://+:8081
    networks:
      - briefapp-net
    restart: unless-stopped

networks:
  briefapp-net:
    driver: bridge

volumes:
  duckdb-data:
    driver: local
  briefapp-logs:
    driver: local
  certbot-webroot:
    driver: local

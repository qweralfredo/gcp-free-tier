# ══════════════════════════════════════════════════════════════════
# briefapp.conf — Nginx reverse proxy completo
# HTTP → HTTPS redirect + FastCGI PHP + proxy .NET API
# ══════════════════════════════════════════════════════════════════

# Upstreams internos da rede Docker briefapp-net
upstream php_fpm {
    server briefapp-php:9000;
    keepalive 4;
}

upstream dotnet_api {
    server briefapp-dotnet:8081;
    keepalive 4;
}

# ── Rate limiting (protege contra abuso) ──────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# ── Servidor HTTP — redireciona tudo para HTTPS ───────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME challenge para renovação automática do certificado SSL
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Tudo mais → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Servidor HTTPS ────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # Certificados Let's Encrypt (gerados pelo Certbot)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Configuração SSL moderna (Mozilla Intermediate)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # Headers de segurança
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "SAMEORIGIN"                                    always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;

    root  /var/www/html/public;
    index index.php;

    # Ocultar versão do Nginx
    server_tokens off;

    # ── Certbot ACME (também via HTTPS) ───────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── API .NET — /api/* ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=10 nodelay;

        proxy_pass         http://dotnet_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # Resposta JSON — sem cache
        add_header Cache-Control "no-store, no-cache" always;
    }

    # ── Login — rate limit mais restrito ──────────────────────────
    location = /login {
        limit_req zone=login burst=3 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass   php_fpm;
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param  REQUEST_URI     $request_uri;
        fastcgi_read_timeout 10s;
    }

    # ── PHP-FPM — todas as rotas PHP ──────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   php_fpm;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param  REQUEST_URI     $request_uri;
        include        fastcgi_params;
        fastcgi_read_timeout 30s;
        fastcgi_connect_timeout 5s;
        fastcgi_send_timeout 30s;
        # Buffer para evitar I/O de disco em respostas pequenas
        fastcgi_buffering on;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # ── Assets estáticos com cache longo ──────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
    }

    # ── Bloquear acesso a arquivos ocultos ────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Limites de upload/body
    client_max_body_size 1m;
}
